version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kenwell_postgres
    environment:
      POSTGRES_DB: kenwell_db
      POSTGRES_USER: kenwell_user
      POSTGRES_PASSWORD: kenwell_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kenwell_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kenwell_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kenwell_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py populate_test_data &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DATABASE_URL=postgresql://kenwell_user:kenwell_secure_password@db:5432/kenwell_db
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=True
      - SECRET_KEY=your-development-secret-key-change-in-production
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    networks:
      - kenwell_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kenwell_frontend
    command: pnpm dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - kenwell_network

volumes:
  postgres_data:

networks:
  kenwell_network:
    driver: bridge
